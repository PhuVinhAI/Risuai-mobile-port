<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" sizes="16x16" href="/logo_16.png" />
    <link rel="icon" type="image/png" sizes="32x32" href="/logo_32.png" />
    <link rel="icon" type="image/png" sizes="256x256" href="/logo_256.png" />
    <link rel="manifest" href="/manifest.json" crossorigin="use-credentials" />
    <link rel="stylesheet" href="/src/styles.css" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.27/dist/katex.min.css" integrity="sha384-Pu5+C18nP5dwykLJOhd2U4Xen7rjScHN/qusop27hdd2drI+lL5KvX7YntvT8yew" crossorigin="anonymous">
    <meta name="description" content="An AI frontend for both light and core users.">
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link href="https://fonts.googleapis.com/css2?family=Tilt+Prism&family=Yellowtail&display=swap" rel="stylesheet">
    <!-- <meta http-equiv="Content-Security-Policy" content="script-src 'self' 'wasm-unsafe-eval' 'unsafe-eval'; object-src 'none'; require-trusted-types-for 'script'; trusted-types plugin-policy;"> -->
    <title>Risuai</title>
  </head>

  <body>
    <div id="app">
      <noscript>
        <div class="noscript">
          <h1>JavaScript is disabled</h1>
          <p>Please enable JavaScript to use this website.</p>
        </div>
      </noscript>
    </div>
    <!-- Loading screen, will be removed when /src/main.ts is loaded -->
    <style>
      @media (max-width: 768px) {
        #preloading-desktop { display: none !important; }
      }
      @media (min-width: 769px) {
        #preloading-mobile { display: none !important; }
      }
      @keyframes pl-entrance{from{transform:scale(.9) translateY(12px);opacity:0}to{transform:scale(1) translateY(0);opacity:1}}
      @keyframes pl-spin{to{transform:rotate(360deg)}}
      @keyframes pl-dot{0%,80%,100%{opacity:.3;transform:scale(.8)}40%{opacity:1;transform:scale(1.2)}}
    </style>

    <div id="preloading" class="absolute top-0 left-0 w-full h-full z-50">
      <!-- PC: original -->
      <div id="preloading-desktop" class="w-full h-full flex justify-center items-center text-textcolor text-xl bg-gray-900 flex-col">
        <div class="flex flex-row items-center">
            <svg class="animate-spin -ml-1 mr-3 h-5 w-5 text-textcolor" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"></path>
            </svg>
            <span>Loading...</span>
        </div>
        <span class="text-sm mt-2 text-textcolor2">Loading Risuai...</span>
      </div>

      <!-- Mobile: new splash -->
      <div id="preloading-mobile" style="width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;background:#18181b;font-family:system-ui,-apple-system,sans-serif;">
        <div style="display:flex;flex-direction:column;align-items:center;gap:24px;animation:pl-entrance .6s cubic-bezier(.16,1,.3,1);">
          <div style="width:96px;height:96px;">
            <img src="/logo_256.png" alt="RisuAI" style="width:96px;height:96px;object-fit:cover;" />
          </div>
          <div style="display:flex;flex-direction:column;align-items:center;gap:6px;">
            <span style="font-size:24px;font-weight:700;color:#e4e4e7;letter-spacing:-0.02em;">RisuAI</span>
            <div style="display:flex;gap:4px;">
              <span style="width:6px;height:6px;border-radius:50%;background:#a78bfa;animation:pl-dot 1.4s ease-in-out infinite;"></span>
              <span style="width:6px;height:6px;border-radius:50%;background:#a78bfa;animation:pl-dot 1.4s ease-in-out infinite .16s;"></span>
              <span style="width:6px;height:6px;border-radius:50%;background:#a78bfa;animation:pl-dot 1.4s ease-in-out infinite .32s;"></span>
            </div>
          </div>
        </div>
      </div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
